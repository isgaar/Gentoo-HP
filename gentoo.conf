# vim: set ft=sh ts=4 sw=4 sts=-1 noet:
# This file will be interpreted by /bin/bash.
#
# Hardware profile: HP Pavilion Laptop 15-eh0xxx
# CPU: AMD Ryzen 5 4500U / Renoir / znver2, 6 cores
# GPU: AMD Renoir Radeon Vega iGPU
# Wi-Fi: Intel Wi-Fi 6 AX200
# Storage seen from Fedora: /dev/nvme0n1, WD Green SN350 2TB


################################################
# Disk configuration

# Replace this with the disk you really want to erase and install Gentoo onto.
# Prefer a stable /dev/disk/by-id/... path when available from the live ISO.
TARGET_DISK="/dev/disk/by-id/REPLACE_ME_WITH_TARGET_NVME"

function disk_configuration() {
	create_classic_single_disk_layout swap=16GiB type=efi luks=true root_fs=btrfs "$TARGET_DISK"
}

function before_prepare_environment() {
	[[ "$TARGET_DISK" != "/dev/disk/by-id/REPLACE_ME_WITH_TARGET_NVME" ]] \
		|| die "Edit TARGET_DISK in gentoo.conf before installing."
	[[ -b "$TARGET_DISK" ]] \
		|| die "TARGET_DISK '$TARGET_DISK' is not a block device."
}


################################################
# System configuration

HOSTNAME="hpgentoo"
TIMEZONE="America/Mexico_City"
KEYMAP="la-latin1"
KEYMAP_INITRAMFS="$KEYMAP"

LOCALES="
C.UTF-8 UTF-8
en_US.UTF-8 UTF-8
es_MX.UTF-8 UTF-8
"
LOCALE="es_MX.UTF-8"

# NetworkManager is enabled in after_install for laptop Wi-Fi ergonomics.
SYSTEMD_NETWORKD=false
SYSTEMD_NETWORKD_INTERFACE_NAME="en*"
SYSTEMD_NETWORKD_DHCP=true
SYSTEMD_NETWORKD_ADDRESSES=("192.168.1.100/32" "fd00::1/64")
SYSTEMD_NETWORKD_GATEWAY="192.168.1.1"
SYSTEMD_INITRAMFS_SSHD=false


################################################
# Gentoo configuration

PORTAGE_SYNC_TYPE="git"
PORTAGE_GIT_FULL_HISTORY=false
PORTAGE_GIT_MIRROR="https://anongit.gentoo.org/git/repo/sync/gentoo.git"
GENTOO_MIRROR="https://distfiles.gentoo.org"

GENTOO_ARCH="amd64"
GENTOO_SUBARCH=""
STAGE3_VARIANT="systemd"
STAGE3_BASENAME="stage3-$GENTOO_ARCH-$STAGE3_VARIANT"
STAGE3_BASENAME_CUSTOM=$([[ $STAGE3_VARIANT == *x32* ]] && echo "stage3-$STAGE3_VARIANT" || echo "stage3-$GENTOO_SUBARCH-$STAGE3_VARIANT")
SYSTEMD=$([[ $STAGE3_VARIANT == *systemd* ]] && echo "true" || echo "false")
MUSL=$([[ $STAGE3_VARIANT == *musl* ]] && echo "true" || echo "false")

USE_PORTAGE_TESTING=false
SELECT_MIRRORS=true
SELECT_MIRRORS_LARGE_FILE=false

# Ryzen 5 4500U: GCC on this laptop resolves -march=native to znver2.
PORTAGE_COMMON_FLAGS="-march=znver2 -O2 -pipe"
PORTAGE_MAKEOPTS="-j6 -l6"
PORTAGE_EMERGE_DEFAULT_OPTS="--jobs=2 --load-average=6 --with-bdeps=y"
PORTAGE_FEATURES="parallel-fetch buildpkg"
PORTAGE_USE="X wayland vulkan vaapi opencl pipewire bluetooth wifi networkmanager dbus udev"
PORTAGE_ACCEPT_LICENSE="* -@EULA"
PORTAGE_CPU_FLAGS_X86="aes avx avx2 bmi1 bmi2 f16c fma3 mmx mmxext pclmul popcnt rdrand sha sse sse2 sse3 sse4_1 sse4_2 sse4a ssse3"
PORTAGE_VIDEO_CARDS="amdgpu radeonsi"
PORTAGE_INPUT_DEVICES="libinput"
PORTAGE_L10N="en en-US es es-MX"
PORTAGE_LINGUAS="en en_US es es_MX"

# Force early initramfs support for the NVMe root disk and AMDGPU KMS.
DRACUT_FORCE_DRIVERS=(amdgpu nvme)


################################################
# Additional laptop packages

ADDITIONAL_PACKAGES=(
	app-portage/cpuid2cpuflags
	net-misc/networkmanager
	net-wireless/iwd
	sys-apps/irqbalance
	sys-apps/pciutils
	sys-apps/usbutils
	sys-power/power-profiles-daemon
)

ENABLE_SSHD=false
ENABLE_BINPKG=false
KERNEL_TYPE=source
ROOT_SSH_AUTHORIZED_KEYS=""

function after_configure_portage() {
	echo "net-misc/networkmanager iwd" > /etc/portage/package.use/networkmanager \
		|| die "Could not write NetworkManager package.use"
}

function after_install() {
	if [[ $SYSTEMD == "true" ]]; then
		try systemctl enable NetworkManager
		try systemctl enable iwd
		try systemctl enable irqbalance
		try systemctl enable power-profiles-daemon
	fi
}


################################################
# Prove that you have read the config

# Set this to true only after replacing TARGET_DISK and reviewing the layout.
I_HAVE_READ_AND_EDITED_THE_CONFIG_PROPERLY=false
