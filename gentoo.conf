# Hardware profile: HP Pavilion Laptop 15-eh0xxx
# CPU: AMD Ryzen 5 4500U / Renoir / znver2, 6 cores
# GPU: AMD Renoir Radeon Vega iGPU
# Wi-Fi: Intel Wi-Fi 6 AX200
# Storage interface: auto-detect exactly one NVMe namespace


################################################
# Disk configuration

# Automatic mode for the replacement NVMe.
# The installer will abort unless exactly one /dev/nvme*n* disk is present.
# To override manually, replace "auto-nvme" with a real disk, e.g. /dev/nvme0n1.
TARGET_DISK="auto-nvme"

function assert_uefi_boot() {
	[[ -d /sys/firmware/efi ]] \
		|| die "This profile is UEFI-only. Reboot the Gentoo USB in UEFI mode."
}

function resolve_target_disk() {
	if [[ "$TARGET_DISK" != "auto-nvme" ]]; then
		echo "$TARGET_DISK"
		return
	fi

	local disks=()
	local dev
	for dev in /dev/nvme*n[0-9]; do
		[[ -b "$dev" ]] \
			&& disks+=("$dev")
	done

	[[ ${#disks[@]} -gt 0 ]] \
		|| die "No NVMe disk was detected. This profile only installs to NVMe."
	[[ ${#disks[@]} -eq 1 ]] \
		|| die "Auto NVMe install requires exactly one NVMe disk. Found: ${disks[*]}"

	echo "${disks[0]}"
}

function disk_configuration() {
	assert_uefi_boot
	TARGET_DISK="$(resolve_target_disk)"
	create_classic_single_disk_layout swap=16GiB type=efi luks=true root_fs=btrfs "$TARGET_DISK"
}

function before_prepare_environment() {
	assert_uefi_boot

	local resolved
	resolved="$(readlink -f "$TARGET_DISK")" \
		|| die "Could not resolve TARGET_DISK '$TARGET_DISK'."
	[[ -b "$resolved" ]] \
		|| die "TARGET_DISK '$TARGET_DISK' is not a block device."
	[[ "$resolved" == /dev/nvme*n[0-9] ]] \
		|| die "TARGET_DISK '$TARGET_DISK' must resolve to a whole NVMe disk, not a partition."

	einfo "Selected NVMe target disk: $TARGET_DISK"
}


