################################################
# User configuration

# Create a normal user with sudo access. The password is requested
# interactively during installation and is never stored in this file.
INSTALL_USER="ismael"
INSTALL_USER_SHELL="/bin/bash"
INSTALL_USER_GROUPS=(wheel audio video input plugdev render)

function after_configure_portage() {
	echo "net-misc/networkmanager iwd" > /etc/portage/package.use/networkmanager \
		|| die "Could not write NetworkManager package.use"
	echo "sys-power/tlp ppd" > /etc/portage/package.use/tlp \
		|| die "Could not write TLP package.use"
	echo "gui-wm/sway swaybar swaynag wallpapers X" > /etc/portage/package.use/sway \
		|| die "Could not write Sway package.use"
	echo "gui-apps/waybar network wifi tray logind pipewire" > /etc/portage/package.use/waybar \
		|| die "Could not write Waybar package.use"
	echo "gui-libs/xdg-desktop-portal-wlr systemd" > /etc/portage/package.use/xdg-desktop-portal-wlr \
		|| die "Could not write xdg-desktop-portal-wlr package.use"
}

function configure_admin_user() {
	[[ -n "$INSTALL_USER" ]] \
		|| return 0

	local existing_groups=()
	local group
	for group in "${INSTALL_USER_GROUPS[@]}"; do
		if getent group "$group" > /dev/null; then
			existing_groups+=("$group")
		elif [[ "$group" == "wheel" ]]; then
			groupadd wheel \
				|| die "Could not create wheel group"
			existing_groups+=("$group")
		else
			ewarn "Group '$group' does not exist; skipping it for $INSTALL_USER"
		fi
	done

	local groups_csv
	groups_csv="$(IFS=,; echo "${existing_groups[*]}")"
	local primary_group="$INSTALL_USER"

	if ! getent group "$primary_group" > /dev/null; then
		groupadd "$primary_group" \
			|| die "Could not create primary group '$primary_group'"
	fi

	if id "$INSTALL_USER" > /dev/null 2>&1; then
		usermod --gid "$primary_group" --append --groups "$groups_csv" --shell "$INSTALL_USER_SHELL" "$INSTALL_USER" \
			|| die "Could not update user '$INSTALL_USER'"
	else
		useradd --create-home --shell "$INSTALL_USER_SHELL" --gid "$primary_group" --groups "$groups_csv" "$INSTALL_USER" \
			|| die "Could not create user '$INSTALL_USER'"
	fi

	install -d -m0750 -o root -g root /etc/sudoers.d \
		|| die "Could not create /etc/sudoers.d"
	printf '%%wheel ALL=(ALL:ALL) ALL\n' > /etc/sudoers.d/00-wheel \
		|| die "Could not write wheel sudoers file"
	chown root:root /etc/sudoers.d/00-wheel \
		|| die "Could not chown wheel sudoers file"
	chmod 0440 /etc/sudoers.d/00-wheel \
		|| die "Could not chmod wheel sudoers file"
	visudo -cf /etc/sudoers.d/00-wheel \
		|| die "Generated sudoers file is invalid"

	einfo "Set password for user '$INSTALL_USER'"
	passwd "$INSTALL_USER" \
		|| die "Could not set password for '$INSTALL_USER'"
}

function configure_sway_desktop() {
	[[ -n "$INSTALL_USER" ]] \
		|| return 0

	local install_user_group
	install_user_group="$(id -gn "$INSTALL_USER")" \
		|| die "Could not determine primary group for '$INSTALL_USER'"

	install -d -m0755 -o root -g root /etc/greetd \
		|| die "Could not create /etc/greetd"
	cat > /etc/greetd/config.toml <<'EOF'
[terminal]
vt = 1

[default_session]
command = "tuigreet --time --remember --cmd 'dbus-run-session sway'"
user = "greetd"
EOF
	chown root:root /etc/greetd/config.toml \
		|| die "Could not chown greetd config"
	chmod 0644 /etc/greetd/config.toml \
		|| die "Could not chmod greetd config"

	install -d -m0755 -o "$INSTALL_USER" -g "$install_user_group" "/home/$INSTALL_USER/.config/sway" \
		|| die "Could not create Sway config directory"
	cat > "/home/$INSTALL_USER/.config/sway/config" <<'EOF'
set $mod Mod4
set $term foot
set $menu wofi --show drun

font pango:Noto Sans 10

floating_modifier $mod normal
setenv XDG_CURRENT_DESKTOP sway
setenv XDG_SESSION_TYPE wayland

input type:keyboard {
	xkb_layout latam
}

input type:touchpad {
	tap enabled
	natural_scroll enabled
}

exec mako
exec waybar
exec swayidle -w \
	timeout 300 'swaylock -f' \
	timeout 600 'swaymsg "output * power off"' \
	resume 'swaymsg "output * power on"' \
	before-sleep 'swaylock -f'

bindsym $mod+Return exec $term
bindsym $mod+d exec $menu
bindsym $mod+Shift+q kill
bindsym $mod+Shift+c reload
bindsym $mod+Shift+e exec swaynag -t warning -m 'Salir de Sway?' -B 'Salir' 'swaymsg exit'
bindsym Print exec grim -g "$(slurp)" - | wl-copy

bindsym $mod+h focus left
bindsym $mod+j focus down
bindsym $mod+k focus up
bindsym $mod+l focus right
bindsym $mod+Left focus left
bindsym $mod+Down focus down
bindsym $mod+Up focus up
bindsym $mod+Right focus right

bindsym $mod+Shift+h move left
bindsym $mod+Shift+j move down
bindsym $mod+Shift+k move up
bindsym $mod+Shift+l move right
bindsym $mod+Shift+Left move left
bindsym $mod+Shift+Down move down
bindsym $mod+Shift+Up move up
bindsym $mod+Shift+Right move right

bindsym $mod+1 workspace number 1
bindsym $mod+2 workspace number 2
bindsym $mod+3 workspace number 3
bindsym $mod+4 workspace number 4
bindsym $mod+5 workspace number 5
bindsym $mod+6 workspace number 6
bindsym $mod+7 workspace number 7
bindsym $mod+8 workspace number 8
bindsym $mod+9 workspace number 9
bindsym $mod+0 workspace number 10

bindsym $mod+Shift+1 move container to workspace number 1
bindsym $mod+Shift+2 move container to workspace number 2
bindsym $mod+Shift+3 move container to workspace number 3
bindsym $mod+Shift+4 move container to workspace number 4
bindsym $mod+Shift+5 move container to workspace number 5
bindsym $mod+Shift+6 move container to workspace number 6
bindsym $mod+Shift+7 move container to workspace number 7
bindsym $mod+Shift+8 move container to workspace number 8
bindsym $mod+Shift+9 move container to workspace number 9
bindsym $mod+Shift+0 move container to workspace number 10

bindsym $mod+b splith
bindsym $mod+v splitv
bindsym $mod+f fullscreen
bindsym $mod+s layout stacking
bindsym $mod+w layout tabbed
bindsym $mod+e layout toggle split
bindsym $mod+space focus mode_toggle
bindsym $mod+Shift+space floating toggle

mode "resize" {
	bindsym h resize shrink width 10px
	bindsym j resize grow height 10px
	bindsym k resize shrink height 10px
	bindsym l resize grow width 10px
	bindsym Left resize shrink width 10px
	bindsym Down resize grow height 10px
	bindsym Up resize shrink height 10px
	bindsym Right resize grow width 10px
	bindsym Return mode "default"
	bindsym Escape mode "default"
}
bindsym $mod+r mode "resize"
EOF
	chown "$INSTALL_USER:$install_user_group" "/home/$INSTALL_USER/.config/sway/config" \
		|| die "Could not chown Sway config"
	chmod 0644 "/home/$INSTALL_USER/.config/sway/config" \
		|| die "Could not chmod Sway config"
}

function after_install() {
	configure_admin_user
	configure_sway_desktop

	if [[ $SYSTEMD == "true" ]]; then
		try systemctl enable NetworkManager
		try systemctl enable iwd
		try systemctl enable greetd.service
		try systemctl enable tlp.service
		try systemctl enable tlp-pd.service
	fi
}


