function validate_install_username() {
	local username="$1"

	[[ -n "$username" ]] \
		|| { ewarn "El nombre de usuario no puede estar vacio."; return 1; }
	[[ "$username" != "root" ]] \
		|| { ewarn "No uses 'root' como usuario normal."; return 1; }
	[[ ${#username} -le 32 ]] \
		|| { ewarn "El nombre de usuario debe tener 32 caracteres o menos."; return 1; }
	[[ "$username" =~ ^[a-z_][a-z0-9_-]*[$]?$ ]] \
		|| { ewarn "Usa minusculas, numeros, guion bajo o guion; debe iniciar con letra minuscula o guion bajo."; return 1; }
}

function normalize_install_user_admin() {
	case "${INSTALL_USER_ADMIN,,}" in
		true|yes|y|1)
			INSTALL_USER_ADMIN=true
			;;
		false|no|n|0)
			INSTALL_USER_ADMIN=false
			;;
		ask|"")
			if ask "Quieres que '$INSTALL_USER' sea administrador con sudo (grupo wheel)?"; then
				INSTALL_USER_ADMIN=true
			else
				INSTALL_USER_ADMIN=false
			fi
			;;
		*)
			die "INSTALL_USER_ADMIN must be true, false or ask"
			;;
	esac
}

function prompt_install_user_configuration() {
	[[ "${INSTALL_USER_CONFIG_READY:-false}" == "true" ]] \
		&& return 0

	if [[ -z "$INSTALL_USER" ]]; then
		while true; do
			flush_stdin
			read -r -p "Nombre del usuario normal que quieres crear: " INSTALL_USER \
				|| die "Error in read"
			validate_install_username "$INSTALL_USER" \
				&& break
		done
	else
		validate_install_username "$INSTALL_USER" \
			|| die "Invalid INSTALL_USER '$INSTALL_USER'"
	fi

	normalize_install_user_admin

	if [[ "$INSTALL_USER_ADMIN" == "true" ]]; then
		einfo "El usuario '$INSTALL_USER' tendra sudo (grupo wheel)."
	else
		ewarn "El usuario '$INSTALL_USER' no tendra sudo. Asigna contrasena de root cuando el instalador pregunte."
	fi

	INSTALL_USER_CONFIG_READY=true
}

function before_install() {
	prompt_install_user_configuration
}

function configure_admin_user() {
	prompt_install_user_configuration

	local requested_groups=("${INSTALL_USER_GROUPS[@]}")
	if [[ "$INSTALL_USER_ADMIN" == "true" ]]; then
		requested_groups+=("${INSTALL_USER_ADMIN_GROUPS[@]}")
	fi

	local existing_groups=()
	local group
	for group in "${requested_groups[@]}"; do
		if getent group "$group" > /dev/null; then
			existing_groups+=("$group")
		elif [[ "$group" == "wheel" ]]; then
			groupadd wheel \
				|| die "Could not create wheel group"
			existing_groups+=("$group")
		else
			ewarn "Group '$group' does not exist; skipping it for $INSTALL_USER"
		fi
	done

	local groups_csv
	groups_csv="$(IFS=,; echo "${existing_groups[*]}")"
	local group_options=()
	[[ -n "$groups_csv" ]] \
		&& group_options=(--groups "$groups_csv")
	local primary_group="$INSTALL_USER"

	if ! getent group "$primary_group" > /dev/null; then
		groupadd "$primary_group" \
			|| die "Could not create primary group '$primary_group'"
	fi

	if id "$INSTALL_USER" > /dev/null 2>&1; then
		usermod --gid "$primary_group" "${group_options[@]}" --shell "$INSTALL_USER_SHELL" "$INSTALL_USER" \
			|| die "Could not update user '$INSTALL_USER'"
	else
		useradd --create-home --shell "$INSTALL_USER_SHELL" --gid "$primary_group" "${group_options[@]}" "$INSTALL_USER" \
			|| die "Could not create user '$INSTALL_USER'"
	fi

	if [[ "$INSTALL_USER_ADMIN" == "true" ]]; then
		install -d -m0750 -o root -g root /etc/sudoers.d \
			|| die "Could not create /etc/sudoers.d"
		printf '%%wheel ALL=(ALL:ALL) ALL\n' > /etc/sudoers.d/00-wheel \
			|| die "Could not write wheel sudoers file"
		chown root:root /etc/sudoers.d/00-wheel \
			|| die "Could not chown wheel sudoers file"
		chmod 0440 /etc/sudoers.d/00-wheel \
			|| die "Could not chmod wheel sudoers file"
		visudo -cf /etc/sudoers.d/00-wheel \
			|| die "Generated sudoers file is invalid"
	else
		einfo "Omitiendo sudo para el usuario '$INSTALL_USER'."
	fi

	einfo "Define la contrasena para el usuario '$INSTALL_USER'"
	passwd "$INSTALL_USER" \
		|| die "Could not set password for '$INSTALL_USER'"
}

function configure_sddm() {
	install -d -m0755 -o root -g root /etc/sddm.conf.d \
		|| die "Could not create /etc/sddm.conf.d"
	cat > /etc/sddm.conf.d/10-gentoo-hp.conf <<'EOF'
[General]
InputMethod=

[Users]
MaximumUid=65000
MinimumUid=1000
EOF
	chown root:root /etc/sddm.conf.d/10-gentoo-hp.conf \
		|| die "Could not chown SDDM config"
	chmod 0644 /etc/sddm.conf.d/10-gentoo-hp.conf \
		|| die "Could not chmod SDDM config"
}

function configure_amd_gpu_acceleration() {
	install -d -m0755 -o root -g root /etc/environment.d \
		|| die "Could not create /etc/environment.d"
	cat > /etc/environment.d/90-amd-renoir-gpu.conf <<'EOF'
# AMD Renoir / Radeon Vega integrated GPU tuning.
LIBVA_DRIVER_NAME=radeonsi
VDPAU_DRIVER=radeonsi
AMD_VULKAN_ICD=RADV
MESA_VK_WSI_PRESENT_MODE=mailbox
EOF
	chown root:root /etc/environment.d/90-amd-renoir-gpu.conf \
		|| die "Could not chown AMD GPU environment"
	chmod 0644 /etc/environment.d/90-amd-renoir-gpu.conf \
		|| die "Could not chmod AMD GPU environment"

	install -d -m0755 -o root -g root /etc/profile.d \
		|| die "Could not create /etc/profile.d"
	cat > /etc/profile.d/90-amd-renoir-gpu.sh <<'EOF'
# AMD Renoir / Radeon Vega integrated GPU tuning.
export LIBVA_DRIVER_NAME="${LIBVA_DRIVER_NAME:-radeonsi}"
export VDPAU_DRIVER="${VDPAU_DRIVER:-radeonsi}"
export AMD_VULKAN_ICD="${AMD_VULKAN_ICD:-RADV}"
export MESA_VK_WSI_PRESENT_MODE="${MESA_VK_WSI_PRESENT_MODE:-mailbox}"
EOF
	chown root:root /etc/profile.d/90-amd-renoir-gpu.sh \
		|| die "Could not chown AMD GPU profile"
	chmod 0644 /etc/profile.d/90-amd-renoir-gpu.sh \
		|| die "Could not chmod AMD GPU profile"
}

