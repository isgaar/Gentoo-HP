################################################
# User configuration

# Create a normal user with sudo access. The password is requested
# interactively during installation and is never stored in this file.
INSTALL_USER="ismael"
INSTALL_USER_SHELL="/bin/bash"
INSTALL_USER_GROUPS=(wheel audio video input plugdev)

function after_configure_portage() {
	echo "net-misc/networkmanager iwd" > /etc/portage/package.use/networkmanager \
		|| die "Could not write NetworkManager package.use"
}

function configure_admin_user() {
	[[ -n "$INSTALL_USER" ]] \
		|| return 0

	local existing_groups=()
	local group
	for group in "${INSTALL_USER_GROUPS[@]}"; do
		if getent group "$group" > /dev/null; then
			existing_groups+=("$group")
		elif [[ "$group" == "wheel" ]]; then
			groupadd wheel \
				|| die "Could not create wheel group"
			existing_groups+=("$group")
		else
			ewarn "Group '$group' does not exist; skipping it for $INSTALL_USER"
		fi
	done

	local groups_csv
	groups_csv="$(IFS=,; echo "${existing_groups[*]}")"

	if id "$INSTALL_USER" > /dev/null 2>&1; then
		usermod --append --groups "$groups_csv" --shell "$INSTALL_USER_SHELL" "$INSTALL_USER" \
			|| die "Could not update user '$INSTALL_USER'"
	else
		useradd --create-home --shell "$INSTALL_USER_SHELL" --groups "$groups_csv" "$INSTALL_USER" \
			|| die "Could not create user '$INSTALL_USER'"
	fi

	install -d -m0750 -o root -g root /etc/sudoers.d \
		|| die "Could not create /etc/sudoers.d"
	printf '%%wheel ALL=(ALL:ALL) ALL\n' > /etc/sudoers.d/00-wheel \
		|| die "Could not write wheel sudoers file"
	chown root:root /etc/sudoers.d/00-wheel \
		|| die "Could not chown wheel sudoers file"
	chmod 0440 /etc/sudoers.d/00-wheel \
		|| die "Could not chmod wheel sudoers file"
	visudo -cf /etc/sudoers.d/00-wheel \
		|| die "Generated sudoers file is invalid"

	einfo "Set password for user '$INSTALL_USER'"
	passwd "$INSTALL_USER" \
		|| die "Could not set password for '$INSTALL_USER'"
}

function after_install() {
	configure_admin_user

	if [[ $SYSTEMD == "true" ]]; then
		try systemctl enable NetworkManager
		try systemctl enable iwd
		try systemctl enable irqbalance
		try systemctl enable power-profiles-daemon
	fi
}


