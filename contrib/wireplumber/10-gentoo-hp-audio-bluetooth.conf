# Enable the hardware monitors that expose ALSA and BlueZ devices to PipeWire.
# Gentoo also installs an equivalent fragment when media-video/pipewire is
# built with USE=sound-server. Keeping it here makes the laptop profile
# explicit and protects existing installs that were built without that flag.
wireplumber.profiles = {
  main = {
    hardware.audio = required
    hardware.bluetooth = required
  }
}
